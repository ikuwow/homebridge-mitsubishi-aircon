name: release-please

on:
  push:
    branches: [master]

# Serialize runs on the same ref so a publish in flight is not raced by the
# next master push. We keep an in-flight publish running rather than canceling
# it, since killing npm publish midway can leave npm in an inconsistent state.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm CLI >= 11.5.1.
      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Show npm version
        run: npm --version

      - name: Install dependencies
        run: npm install --no-save

      # Re-run tests against the merged commit; a failure here aborts publish.
      - name: Run tests (publish gate)
        run: npm test

      - name: Show package contents
        run: npm pack --dry-run

      # `--tag latest` is explicit so prereleases also land on the `latest`
      # dist-tag while we are still in the alpha phase. npm CLI 11.x refuses
      # to publish a prerelease without an explicit --tag. Revisit this when
      # cutting the first stable 2.0.0 release.
      - name: Publish to npm
        run: npm publish --access public --tag latest
